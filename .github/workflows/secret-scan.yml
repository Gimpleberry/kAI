name: Secret scan

# Per Tenet 3: this is the safety net for the "no hardcoded secrets" rule.
# Combined with the local pre-commit hook, secrets have to bypass two
# layers of defense to leak.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # gitleaks needs full history

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
